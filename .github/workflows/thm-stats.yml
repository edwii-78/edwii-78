name: Update TryHackMe Stats Card

on:
  workflow_dispatch:    # run manually whenever you update your stats

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate TryHackMe stats card
        run: python generate_thm_card.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/thm-stats.svg
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "chore: update TryHackMe stats card" && git push)
