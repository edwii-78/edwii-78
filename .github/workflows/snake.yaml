name: Threat Path Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: edwii-78
          outputs: |
            dist/threat-path.svg?color_snake=f85149&color_dots=#0d1117,#1a1f2e,#0d2137,#0d4a7a,#1f6feb&color_empty=#0d1117
            dist/threat-path-dark.svg?palette=github-dark&color_snake=f85149&color_dots=#0d1117,#1a1f2e,#0d2137,#0d4a7a,#1f6feb

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
