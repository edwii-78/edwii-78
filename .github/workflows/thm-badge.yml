name: Update TryHackMe Badge

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch TryHackMe Badge
        uses: DhanushNehru/tryhackme-badge-action-workflow@v1.0
        continue-on-error: true
        with:
          image_path: './assets/thm-badge.png'
          username: 'edwindominic7878'
          user_id: ${{ secrets.THM_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit badge if changed
        run: |
          git add assets/thm-badge.png || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update TryHackMe badge"
          git push origin "HEAD:${{ github.ref_name }}"
