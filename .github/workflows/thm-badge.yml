name: Update TryHackMe Badge

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download TryHackMe badge
        run: |
          mkdir -p assets
          curl -fsSL "https://tryhackme-badges.s3.amazonaws.com/edwindominic7878.png" \
            -o assets/thm-badge.png || echo "Badge download failed, skipping"

      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/thm-badge.png
          git diff --cached --quiet || git commit -m "chore: update TryHackMe badge"
          git push
