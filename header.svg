<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6edf3"/>
      <stop offset="60%" style="stop-color:#c9d1d9"/>
      <stop offset="100%" style="stop-color:#8b949e"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#1f6feb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0"/>
    </linearGradient>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nameGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="240" fill="url(#bg)"/>

  <!-- Subtle grid lines - horizontal -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="180" x2="900" y2="180" stroke="#161b22" stroke-width="1"/>
  <!-- Subtle grid lines - vertical -->
  <line x1="150" y1="0" x2="150" y2="240" stroke="#161b22" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="240" stroke="#161b22" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="240" stroke="#161b22" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="240" stroke="#161b22" stroke-width="1"/>
  <line x1="750" y1="0" x2="750" y2="240" stroke="#161b22" stroke-width="1"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="900" height="2" fill="url(#accentLine)"/>

  <!-- Blinking dot - top left status -->
  <circle cx="32" cy="28" r="4" fill="#238636">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="44" y="33" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
    font-size="11" fill="#3fb950" letter-spacing="0.5">SYSTEMS ONLINE</text>

  <!-- Top right - incident counter -->
  <text x="868" y="33" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
    font-size="11" fill="#6e7681" text-anchor="end">0 ACTIVE INCIDENTS</text>

  <!-- Thin separator line below status -->
  <line x1="24" y1="44" x2="876" y2="44" stroke="#21262d" stroke-width="1"/>

  <!-- Main name -->
  <text x="450" y="132"
    font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
    font-size="46" font-weight="700" fill="url(#nameGrad)"
    text-anchor="middle" filter="url(#nameGlow)" letter-spacing="4">
    Edwin Dominic
  </text>

  <!-- Role subtitle -->
  <text x="450" y="164"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="15" fill="#8b949e" text-anchor="middle" letter-spacing="1">
    Security Operations · Detection Engineering · Threat Analysis
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="192" width="900" height="1" fill="url(#accentLine)" opacity="0.6"/>

  <!-- Bottom stats row -->
  <!-- CEH badge -->
  <rect x="24" y="205" width="78" height="22" rx="11" fill="#1f3a5f" stroke="#1f6feb" stroke-width="0.8"/>
  <text x="63" y="220" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
    font-size="10" fill="#79c0ff" text-anchor="middle" font-weight="600">CEH v13</text>

  <!-- MITRE badge -->
  <rect x="112" y="205" width="120" height="22" rx="11" fill="#3d1a1a" stroke="#f85149" stroke-width="0.8"/>
  <text x="172" y="220" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
    font-size="10" fill="#ff7b72" text-anchor="middle" font-weight="600">MITRE ATT&amp;CK · 8 TTPs</text>

  <!-- CVE badge -->
  <rect x="242" y="205" width="120" height="22" rx="11" fill="#271f08" stroke="#d29922" stroke-width="0.8"/>
  <text x="302" y="220" font-family="ui-monospace,SFMono-Regular,'SF Mono',Consolas,monospace"
    font-size="10" fill="#e3b341" text-anchor="middle" font-weight="600">15+ CVEs Disclosed</text>

  <!-- Location -->
  <text x="876" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="11" fill="#6e7681" text-anchor="end">Kerala, India · Open to Relocation</text>

  <!-- Animated scan line — very subtle -->
  <rect x="0" y="0" width="900" height="1" fill="#1f6feb" opacity="0">
    <animate attributeName="y" from="44" to="192" dur="6s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.08;0.08;0" keyTimes="0;0.05;0.95;1" dur="6s" repeatCount="indefinite" begin="2s"/>
  </rect>
</svg>
