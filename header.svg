<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="50%" style="stop-color:#050d24"/>
      <stop offset="100%" style="stop-color:#020818"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00B4D8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#90E0EF"/>
      <stop offset="50%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" fill="#00B4D8" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#scanlines)"/>

  <!-- Corner brackets — top left -->
  <path d="M 20 20 L 20 60 M 20 20 L 60 20" stroke="#00B4D8" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.9"/>
  <!-- Corner brackets — top right -->
  <path d="M 880 20 L 880 60 M 880 20 L 840 20" stroke="#00B4D8" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.9"/>
  <!-- Corner brackets — bottom left -->
  <path d="M 20 260 L 20 220 M 20 260 L 60 260" stroke="#00B4D8" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.9"/>
  <!-- Corner brackets — bottom right -->
  <path d="M 880 260 L 880 220 M 880 260 L 840 260" stroke="#00B4D8" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.9"/>

  <!-- Animated grid dots -->
  <g opacity="0.12">
    <circle cx="100" cy="50" r="1" fill="#00B4D8"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3s" repeatCount="indefinite" begin="0s"/></circle>
    <circle cx="200" cy="30" r="1" fill="#00B4D8"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="350" cy="50" r="1" fill="#00B4D8"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.5s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="700" cy="40" r="1" fill="#00B4D8"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.5s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="800" cy="55" r="1" fill="#00B4D8"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2s" repeatCount="indefinite" begin="1.2s"/></circle>
    <circle cx="50" cy="200" r="1" fill="#00B4D8"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="850" cy="200" r="1" fill="#00B4D8"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3s" repeatCount="indefinite" begin="0.4s"/></circle>
  </g>

  <!-- Animated scan line moving down -->
  <rect x="0" y="0" width="900" height="2" fill="#00B4D8" opacity="0.15">
    <animate attributeName="y" from="-2" to="282" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.25;0.25;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Horizontal accent lines -->
  <rect x="0" y="100" width="900" height="0.5" fill="url(#lineGrad)" opacity="0.4"/>
  <rect x="0" y="188" width="900" height="0.5" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- SOC tag top left -->
  <rect x="28" y="28" width="90" height="18" rx="2" fill="#00B4D8" opacity="0.1" stroke="#00B4D8" stroke-width="0.5"/>
  <text x="73" y="41" font-family="'Courier New', monospace" font-size="9" fill="#00B4D8" text-anchor="middle" filter="url(#glow)" opacity="0.9">BLUE TEAM SOC</text>

  <!-- CLASSIFIED tag top right -->
  <rect x="782" y="28" width="90" height="18" rx="2" fill="#0D47A1" opacity="0.2" stroke="#0077B6" stroke-width="0.5"/>
  <text x="827" y="41" font-family="'Courier New', monospace" font-size="9" fill="#90E0EF" text-anchor="middle" opacity="0.9">CLASSIFIED</text>

  <!-- Status dot blinking -->
  <circle cx="36" cy="113" r="4" fill="#00B4D8" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="117" font-family="'Courier New', monospace" font-size="8" fill="#90E0EF" opacity="0.7">SYSTEM ONLINE</text>

  <!-- Right side status -->
  <circle cx="830" cy="113" r="4" fill="#0077B6" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="840" y="117" font-family="'Courier New', monospace" font-size="8" fill="#90E0EF" opacity="0.7">NO THREATS</text>

  <!-- Main name — EDWIN DOMINIC with glow -->
  <text x="450" y="158" font-family="'Courier New', monospace" font-size="48" font-weight="bold"
    fill="url(#textGrad)" text-anchor="middle" filter="url(#strongGlow)" letter-spacing="6">
    EDWIN DOMINIC
  </text>
  <!-- Name shadow for depth -->
  <text x="452" y="160" font-family="'Courier New', monospace" font-size="48" font-weight="bold"
    fill="#003566" text-anchor="middle" opacity="0.3" letter-spacing="6">
    EDWIN DOMINIC
  </text>

  <!-- Role line -->
  <text x="450" y="185" font-family="'Courier New', monospace" font-size="13"
    fill="#90E0EF" text-anchor="middle" letter-spacing="3" opacity="0.9">
    SOC ANALYST  ◆  DETECTION ENGINEER  ◆  CEH v13
  </text>

  <!-- Animated data packet — left side -->
  <rect x="0" y="139" width="6" height="2" rx="1" fill="#00B4D8" filter="url(#glow)">
    <animate attributeName="x" from="-10" to="910" dur="3s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Animated data packet — right side, faster -->
  <rect x="0" y="143" width="4" height="1" rx="1" fill="#0077B6" filter="url(#glow)">
    <animate attributeName="x" from="910" to="-10" dur="2.2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.05;0.95;1" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Third packet -->
  <rect x="0" y="137" width="8" height="1" rx="1" fill="#023E8A" opacity="0.7">
    <animate attributeName="x" from="-10" to="910" dur="4s" repeatCount="indefinite" begin="1.5s"/>
  </rect>

  <!-- Shield icon left of name -->
  <g transform="translate(122, 130)" filter="url(#glow)" opacity="0.6">
    <path d="M 15 2 L 28 8 L 28 18 C 28 24 21.5 29 15 31 C 8.5 29 2 24 2 18 L 2 8 Z"
      fill="none" stroke="#00B4D8" stroke-width="1.5"/>
    <path d="M 10 16 L 14 20 L 21 13" stroke="#00B4D8" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Shield icon right -->
  <g transform="translate(758, 130)" filter="url(#glow)" opacity="0.6">
    <path d="M 15 2 L 28 8 L 28 18 C 28 24 21.5 29 15 31 C 8.5 29 2 24 2 18 L 2 8 Z"
      fill="none" stroke="#00B4D8" stroke-width="1.5"/>
    <path d="M 10 16 L 14 20 L 21 13" stroke="#00B4D8" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="258" width="900" height="22" fill="#00B4D8" opacity="0.04"/>
  <text x="450" y="273" font-family="'Courier New', monospace" font-size="8" fill="#00B4D8"
    text-anchor="middle" opacity="0.6" letter-spacing="2">
    THREAT MONITORING ACTIVE  ◆  WAZUH  ◆  SPLUNK  ◆  MITRE ATT&amp;CK  ◆  15+ CVEs DISCLOSED  ◆  CERT-IN HALL OF FAME
  </text>

  <!-- Pulse rings on shield icons -->
  <circle cx="137" cy="162" r="20" fill="none" stroke="#00B4D8" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="18;28;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="773" cy="162" r="20" fill="none" stroke="#00B4D8" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="18;28;18" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
